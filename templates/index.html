<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장비 관리 시스템</title>
    <!-- Tailwind CSS (경량 UI framework) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
                <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900">📱 장비 관리 시스템</h1>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg transition duration-200">
                + 신규 장비 등록
            </button>
        </header>

        <!-- ==================================================== -->
        <!-- [UI 모듈 1] 장비 목록 테이블 -->
        <!-- ==================================================== -->
        <main class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">장비명</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">카테고리</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">제조사/모델</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">시리얼 넘버</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">구입일</th>
                            <!-- [★ 칼럼 추가 시] 여기에 <th> 추가 -->
                            <th class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">관리</th>
                        </tr>
                    </thead>
                    <tbody id="equipmentTableBody" class="bg-white divide-y divide-slate-200">
                        <!-- JS에 의해 dynamic 생성되는 영역 -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- ==================================================== -->
    <!-- [UI 모듈 2] 등록/수정 모달 (팝업) -->
    <!-- ==================================================== -->
    <div id="equipmentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800">신규 장비 등록</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="equipmentForm" class="p-6">
                <input type="hidden" id="eq_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">장비 별명 (필수)</label>
                        <input type="text" id="name" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">카테고리</label>
                        <input type="text" id="category" placeholder="예: 노트북" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">제조사</label>
                        <input type="text" id="manufacturer" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">모델명</label>
                        <input type="text" id="model_name" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">시리얼 넘버</label>
                        <input type="text" id="serial_number" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">구입일</label>
                        <input type="date" id="purchase_date" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">메모/비고</label>
                        <textarea id="memo" rows="2" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    
                    <!-- [★ 칼럼 추가 시] 
                         여기에 새로운 입력 필드를 추가하세요. 
                         (예: <div><label>가격</label><input type="number" id="price"></div>) 
                    -->
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-600 hover:bg-slate-50 font-medium">취소</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================================================== -->
    <!-- [JS 스크립트 모듈] 프론트엔드 동적 로직 -->
    <!-- ==================================================== -->
        <script>
        let currentEquipmentData = [];

        /**
         * [기능 1] 목록 조회 및 테이블 렌더링
         */
        async function fetchEquipment() {
            const res = await fetch('/api/equipment');
            const data = await res.json();
            currentEquipmentData = data;
            
            const tbody = document.getElementById('equipmentTableBody');
            tbody.innerHTML = '';

            data.forEach(item => {
                /**
                 * [★ 칼럼 추가 시] 
                 * 1. <td> 추가
                 * 2. `${item.새칼럼명 || ''}` 형태로 매핑
                 */
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-bold text-slate-900">${item.name}</div>
                            ${item.memo ? `<div class="text-xs text-slate-500 truncate max-w-xs">${item.memo}</div>` : ''}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                ${item.category || '기타'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                            ${item.manufacturer || '-'} / ${item.model_name || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-mono">
                            ${item.serial_number || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                            ${item.purchase_date || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="editEquipment(${item.id})" class="text-indigo-600 hover:text-indigo-900 mr-3">수정</button>
                            <button onclick="deleteEquipment(${item.id})" class="text-red-600 hover:text-red-900">삭제</button>
                        </td>
                    </tr>
                `;
            });
        }

        /**
         * [기능 2] 모달 제어
         */
        function openModal(id = null) {
            const modal = document.getElementById('equipmentModal');
            const form = document.getElementById('equipmentForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();
            document.getElementById('eq_id').value = '';
            
            if (id) {
                title.innerText = '장비 정보 수정';
                const item = currentEquipmentData.find(e => e.id === id);
                if (item) {
                    document.getElementById('eq_id').value = item.id;
                    document.getElementById('name').value = item.name;
                    document.getElementById('category').value = item.category || '';
                    document.getElementById('manufacturer').value = item.manufacturer || '';
                    document.getElementById('model_name').value = item.model_name || '';
                    document.getElementById('serial_number').value = item.serial_number || '';
                    document.getElementById('purchase_date').value = item.purchase_date || '';
                    document.getElementById('memo').value = item.memo || '';
                    // [★ 칼럼 추가 시] document.getElementById('새id').value = item.새칼럼 || '';
                }
            } else {
                title.innerText = '신규 장비 등록';
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('equipmentModal').classList.add('hidden');
        }

        /**
         * [기능 3] 등록 및 수정 제출 처리
         */
        document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('eq_id').value;
            const payload = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                manufacturer: document.getElementById('manufacturer').value,
                model_name: document.getElementById('model_name').value,
                serial_number: document.getElementById('serial_number').value,
                purchase_date: document.getElementById('purchase_date').value,
                memo: document.getElementById('memo').value,
                // [★ 칼럼 추가 시] 새칼럼: document.getElementById('새id').value
            };

            const url = id ? `/api/equipment/${id}` : '/api/equipment';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    closeModal();
                    fetchEquipment();
                } else {
                    alert('저장에 실패했습니다.');
                }
            } catch (err) {
                console.error(err);
                alert('오류가 발생했습니다.');
            }
        });

        /**
         * [기능 4] 수정 버튼 클릭 시
         */
        function editEquipment(id) {
            openModal(id);
        }

        /**
         * [기능 5] 삭제 처리
         */
        async function deleteEquipment(id) {
            if (confirm('정말 삭제하시겠습니까?')) {
                await fetch(`/api/equipment/${id}`, { method: 'DELETE' });
                fetchEquipment();
            }
        }

        // 초기 로드
        fetchEquipment();
    </script>
</body>
</html>
